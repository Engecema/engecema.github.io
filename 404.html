<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Validação Dallas</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body { background: var(--dark); margin: 0; overflow: hidden; font-family: Arial, sans-serif; display: flex; justify-content: flex-end; }
        #aba-private {
            width: 400px; height: 100vh; background: #111; border-left: 2px solid var(--gold);
            display: flex; flex-direction: column; padding: 60px 40px; box-shadow: -20px 0 70px #000; color: #fff;
        }
        input { width: 100%; padding: 20px; background: #000; border: 1px solid #333; color: var(--gold); font-size: 32px; text-align: center; letter-spacing: 10px; margin: 30px 0; outline: none; }
        button { width: 100%; padding: 20px; background: var(--red); color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="aba-private">
        <img src="logo.png" style="height:30px; margin-bottom:20px;">
        <h2 id="t-aba" style="color:var(--gold); font-size:16px;">SENHA DE ACESSO</h2>
        <p id="s-aba" style="color:#666; font-size:12px;">Identificação Dallas requerida.</p>
        <input type="password" id="p-field" maxlength="4" placeholder="••••">
        <button id="b-action" onclick="fluxo()">Avançar</button>
    </div>

    <script>
        let pass1 = "";
        function fluxo() {
            const val = document.getElementById('p-field').value;
            if(val.length === 4) {
                if(pass1 === "") {
                    pass1 = val;
                    document.getElementById('t-aba').innerText = "CONFIRMAR SENHA";
                    document.getElementById('s-aba').innerText = "Repita para validar a segurança.";
                    document.getElementById('p-field').value = "";
                } else if(val === pass1) {
                    window.location.href = "produção.html";
                } else {
                    alert("Senhas não conferem.");
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
