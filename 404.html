<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Validação Dallas</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body { background: var(--dark); margin: 0; overflow: hidden; font-family: Arial, sans-serif; display: flex; justify-content: flex-end; }
        #aba-seguranca {
            width: 400px; height: 100vh; background: #111; border-left: 2px solid var(--gold);
            display: flex; flex-direction: column; padding: 60px 40px; box-shadow: -20px 0 70px #000; color: #fff;
        }
        input { width: 100%; padding: 20px; background: #000; border: 1px solid #333; color: var(--gold); font-size: 32px; text-align: center; letter-spacing: 10px; margin: 30px 0; outline: none; }
        button { width: 100%; padding: 20px; background: var(--red); color: #fff; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>
    <div id="aba-seguranca">
        <h2 id="tit" style="color:var(--gold)">SENHA DE ACESSO</h2>
        <p id="sub" style="color:#666; font-size:12px;">Informe sua senha de 4 dígitos para o terminal Dallas.</p>
        <input type="password" id="p" maxlength="4" placeholder="••••">
        <button id="btn-p" onclick="fluxo()">Avançar</button>
        <p id="err" style="color:var(--red); font-size:11px; margin-top:15px; display:none; text-align:center;">As senhas não conferem.</p>
    </div>
    <script>
        let s1 = "";
        function fluxo() {
            const val = document.getElementById('p').value;
            if(val.length === 4) {
                if(s1 === "") {
                    s1 = val;
                    document.getElementById('tit').innerText = "CONFIRMAR SENHA";
                    document.getElementById('sub').innerText = "Repita para validar a segurança.";
                    document.getElementById('p').value = "";
                } else if(val === s1) {
                    window.location.href = "produção.html";
                } else {
                    document.getElementById('err').style.display = 'block';
                    setTimeout(() => location.reload(), 2000);
                }
            }
        }
    </script>
</body>
</html>
