<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f4; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #0f62fe; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #0f62fe; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<form id="meuFormulario">
    <h2>Abertura de Conta</h2>
    <input type="text" name="nome" placeholder="Nome Completo" required>
    <input type="email" name="email" placeholder="E-mail Corporativo" required>
    <button type="submit">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1. CREDENCIAIS INTEGRADAS (Método de Alta Compatibilidade)
    const APIKEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const DB_NAME = "cliente_engecema";
    
    // Inserindo a APIKEY diretamente na URL para evitar bloqueio de Header pelo Navegador
    const URL_DIRETA = `https://apikey:${APIKEY}@7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud/${DB_NAME}`;

    const formData = new FormData(e.target);
    const dados = Object.fromEntries(formData.entries());
    dados.criado_em = new Date().toISOString();

    try {
        const response = await fetch(URL_DIRETA, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
                // O Authorization foi removido daqui pois já está na URL_DIRETA
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Sucesso! O Engecema Private recebeu seus dados.");
            e.target.reset();
        } else {
            const erroData = await response.json();
            console.error(erroData);
            alert("Erro na IBM: Verifique se o banco 'cliente_engecema' existe.");
        }
    } catch (error) {
        console.error(error);
        alert("Ocorreu um erro de rede. Verifique se o banco de dados está online.");
    }
});
</script>

</body>
</html>
