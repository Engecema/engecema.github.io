<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro Seguro</title>
    
    <!-- SOLUÇÃO FAVICON: Caminho absoluto para garantir carregamento em qualquer tela -->
    <link rel="shortcut icon" href="https://engecema.github.io" type="image/x-icon">
    <link rel="icon" href="https://engecema.github.io" type="image/x-icon">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #da1e28; text-align: center; margin-bottom: 20px; font-size: 24px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .erro-senha { color: #da1e28; font-size: 12px; display: none; margin-bottom: 10px; font-weight: bold; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #da1e28; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s;
        }
        button:hover { background-color: #b91922; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<!-- SOLUÇÃO ERRO DE REDE: Usando integração via Webhook/Formspree para evitar bloqueio CORS -->
<form id="formCadastro">
    <h2>Engecema Private</h2>
    
    <label>Nome Completo</label>
    <input type="text" name="nome" placeholder="Digite seu nome" required>

    <label>E-mail Corporativo</label>
    <input type="email" name="email" placeholder="seu@email.com" required>

    <label>CPF</label>
    <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" required>

    <label>Crie uma Senha</label>
    <input type="password" id="senha" name="senha" placeholder="******" required>

    <label>Confirme a Senha</label>
    <input type="password" id="confirmar_senha" placeholder="******" required>
    <span id="msgErro" class="erro-senha">As senhas não coincidem!</span>

    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
    <p id="status"></p>
</form>

<script>
    document.getElementById('formCadastro').onsubmit = async function(e) {
        e.preventDefault();
        
        const senha = document.getElementById('senha').value;
        const confirma = document.getElementById('confirmar_senha').value;
        const msgErro = document.getElementById('msgErro');
        const status = document.getElementById('status');

        if (senha !== confirma) {
            msgErro.style.display = 'block';
            return;
        }
        msgErro.style.display = 'none';
        status.innerText = "Processando abertura de conta...";

        // NOVA ESTRATÉGIA: Usar o Webhook do Formspree (Gratuito) que aceita o POST sem erro CORS
        // Crie sua conta gratuita em formspree.io e cole o ID abaixo
        const FORMSPREE_ID = "xpzeqlra"; // Substitua pelo seu ID real do Formspree
        const FORM_URL = `https://formspree.io{FORMSPREE_ID}`;

        const formData = new FormData(this);

        try {
            const response = await fetch(FORM_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                status.style.color = "green";
                status.innerText = "Sucesso! Cadastro enviado para validação Engecema.";
                this.reset();
                // Redirecionamento automático após 2 segundos
                setTimeout(() => { window.location.href = "https://engecema.github.io"; }, 2000);
            } else {
                status.style.color = "red";
                status.innerText = "Erro ao processar. Tente novamente em instantes.";
            }
        } catch (error) {
            status.style.color = "red";
            status.innerText = "Falha de conexão segura. Verifique sua rede.";
        }
    };
</script>

</body>
</html>
