<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; margin: 0; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #cc092f; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 13px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        #btnFinalizar { width: 100%; padding: 15px; background: #cc092f; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #btnFinalizar:hover { background: #a50725; }
    </style>
</head>
<body>
<form id="formCadastro">
    <h2>Abertura de Conta</h2>
    <label>Nome Completo</label>
    <input type="text" name="nome" required>
    <label>CPF</label>
    <input type="text" name="cpf" required>
    <label>E-mail Corporativo</label>
    <input type="email" name="email" required>
    <label>Senha (4 dígitos)</label>
    <input type="password" id="senha" name="senha" maxlength="4" required>
    <label>Confirmar Senha</label>
    <input type="password" id="confirmar_senha" maxlength="4" required>
    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    const s = document.getElementById('senha').value;
    const c = document.getElementById('confirmar_senha').value;
    if (s !== c) { alert("Senhas não conferem!"); return; }

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const URL_DB = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    const dados = Object.fromEntries(new FormData(this).entries());
    dados.criado_em = new Date().toISOString();

    try {
        const res = await fetch(URL_DB, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa("apikey:" + API_KEY)
            },
            body: JSON.stringify(dados)
        });
        if (res.ok) { 
            alert("Cadastro Engecema Private Realizado!"); 
            window.location.href = "index.html"; 
        } else { 
            alert("Erro na IBM: Cadastro em processamento offline."); 
            window.location.href = "index.html";
        }
    } catch (err) { 
        alert("Modo Dallas Offline: Cadastro enviado."); 
        window.location.href = "index.html";
    }
};
</script>
</body>
</html>
