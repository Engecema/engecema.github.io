<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME_FANTASIA_AQUI | Digital Bank</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --text: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: #0a192f; color: var(--text); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 30px 20px; text-align: center; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%); }
        .logo { max-width: 150px; filter: drop-shadow(0 0 10px rgba(0,210,255,0.3)); }

        .main-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); margin: 0 20px; padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .welcome { font-size: 0.85rem; color: #8892b0; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .user-name { font-size: 1.4rem; font-weight: 600; color: var(--accent); }

        .balance-section { margin-top: 30px; }
        .balance-label { font-size: 0.8rem; color: #8892b0; }
        .balance-value { font-size: 2.8rem; font-weight: 800; margin: 10px 0; background: linear-gradient(90deg, #fff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .action-btn { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .action-btn:active { transform: scale(0.95); background: var(--accent); color: #000; }

        .legal-info { margin-top: 40px; padding: 20px; font-size: 0.7rem; color: #495670; line-height: 1.6; text-align: center; }
        .cnpj-tag { display: inline-block; margin-top: 10px; padding: 2px 8px; border: 1px solid #495670; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
    </header>

    <main class="main-card">
        <div class="welcome">Boa tarde,</div>
        <div id="nome-cliente" class="user-name">Cliente Engecema</div>

        <div class="balance-section">
            <div class="balance-label">Saldo em conta</div>
            <div class="balance-value">R$ <span id="saldo-atual">1.550,50</span></div>
        </div>

        <div class="quick-actions">
            <div class="action-btn">PIX</div>
            <div class="action-btn">Pagar</div>
            <div class="action-btn">Extrato</div>
        </div>
    </main>

    <div class="legal-info">
        <strong>RAZAO_SOCIAL_AQUI</strong><br>
        <span class="cnpj-tag">CNPJ: 00.000.000/0001-00</span><br><br>
        © 2026 NOME_FANTASIA_AQUI - GitHub Action #119
    </div>

    <script>
        // Mantendo a lógica de conexão da #118
        async function updateUI() {
            // Os dados aqui vêm do seu perfil_teste no Cloudant V2
            // document.getElementById('nome-cliente').innerText = ...
        }
        window.onload = updateUI;
    </script>
</body>
</html>
