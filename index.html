<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema | Digital Banking</title>
    <!-- Logomarca como Ícone (Favicon) -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --danger: #ff4d4d; --card: #112240; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--primary); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .logo { max-width: 140px; filter: drop-shadow(0 0 15px rgba(0,210,255,0.2)); }
        h1 { font-size: 1.2rem; color: var(--accent); margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; }

        .main-card { background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .balance-label { font-size: 0.8rem; color: #8892b0; text-transform: uppercase; }
        .balance-value { font-size: 2.6rem; font-weight: 800; color: var(--success); margin: 15px 0; }

        .btn-pix { background: var(--accent); color: #0a192f; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; border: none; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        
        .extrato { margin-top: 35px; text-align: left; }
        .extrato-header { font-size: 0.75rem; color: #8892b0; margin-bottom: 15px; border-bottom: 1px solid #233554; padding-bottom: 10px; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1d2d50; }
        
        .footer-legal { margin-top: auto; padding: 40px 20px; font-size: 0.75rem; color: #495670; line-height: 1.8; text-align: center; background: rgba(0,0,0,0.2); width: 100%; box-sizing: border-box; }
        .address { font-style: normal; display: block; margin-top: 10px; color: #334155; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Engecema Logo" class="logo">
        <h1>Engecema</h1>
    </header>

    <main class="main-card">
        <div class="balance-label">Saldo Disponível</div>
        <div class="balance-value">R$ <span id="val-saldo">1.550,50</span></div>
        
        <button class="btn-pix" onclick="alert('Funcionalidade Pix Integrada!')">REALIZAR PIX</button>

        <div class="extrato">
            <div class="extrato-header">ATIVIDADES RECENTES</div>
            <div class="item">
                <div style="font-size: 0.85rem;">Depósito Recebido<br><small style="color: #495670;">17 Mar 2026</small></div>
                <div style="color: var(--success); font-weight: 700;">+ R$ 1.550,50</div>
            </div>
        </div>
    </main>

    <footer class="footer-legal">
        <strong>ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA.</strong><br>
        CNPJ: 05.368.602/0001-10<br>
        <address class="address">
            Rua Jose de Moraes Rego, 1299, Centro<br>
            Campinas do Piaui - PI
        </address>
        <div style="margin-top: 20px; opacity: 0.5;">© 2026 Engecema Bank | Action #125 Final</div>
    </footer>

</body>
</html>
