<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>engecema</title>
    <style>
        /* DESIGN CORPORATIVO ENGECEMA - VERDE ESMERALDA */
        :root { --emerald: #2ecc71; --dark: #27ae60; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--emerald); position: relative; }
        .brand { font-size: 32px; font-weight: 900; color: var(--emerald); text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
        
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .service-item { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; font-weight: 600; font-size: 12px; }
        .service-item:hover { border-color: var(--emerald); transform: translateY(-5px); }
        .service-item span { display: block; font-size: 28px; margin-bottom: 8px; }

        .btn-action { background: var(--emerald); color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-secondary { background: none; border: 2px solid var(--emerald); color: var(--emerald); padding: 14px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #edf2f4; border-radius: 12px; font-size: 16px; box-sizing: border-box; }

        /* MODAIS E TOKEN */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; position: relative; }
        .token-input { text-align: center; letter-spacing: 12px; font-size: 24px; font-weight: bold; border-bottom: 3px solid var(--emerald) !important; }
    </style>
</head>
<body>

    <!-- TELA LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="card" style="max-width: 400px; margin: 80px auto; border:none; text-align:center;">
            <div class="brand">ENGECEMA</div>
            <p style="font-size:14px; color:#666;">Acesse sua plataforma global</p>
            <input type="text" id="login-cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-action" onclick="fluxoLogin()">Entrar na Conta</button>
            <button class="btn-secondary" onclick="mudarTela('screen-cadastro')">Abrir Nova Conta</button>
        </div>
    </div>

    <!-- TELA CADASTRO (NOVA) -->
    <div id="screen-cadastro" class="screen">
        <div class="card" style="max-width: 450px; margin: 40px auto; border-left-color: #3498db;">
            <h2 style="color:var(--emerald); text-align:center;">Seja ENGECEMA</h2>
            <p style="text-align:center; font-size:14px; color:#666;">Abra sua conta digital em minutos.</p>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="email" id="cad-email" placeholder="E-mail Corporativo">
            <input type="text" id="cad-cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
            <input type="password" id="cad-pass" placeholder="Crie uma Senha (6 dígitos)">
            <button class="btn-action" onclick="enviarTokenCadastro()">Cadastrar e Validar E-mail</button>
            <button class="btn-secondary" style="border:none; color:#999;" onclick="mudarTela('screen-login')">Voltar ao Login</button>
        </div>
    </div>

    <!-- TELA VALIDAÇÃO TOKEN (NOVA) -->
    <div id="screen-token" class="screen">
        <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h2 style="color:var(--dark);">Validar Acesso</h2>
            <p id="token-msg" style="font-size: 14px; color:#666;">Enviamos um código para seu e-mail.</p>
            <input type="text" id="input-token" class="token-input" placeholder="000000" maxlength="6">
            <button class="btn-action" onclick="validarTokenEAtivar()">Ativar Conta ENGECEMA</button>
        </div>
    </div>

    <!-- DASHBOARD INTEGRAL -->
    <div id="screen-dash" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="brand" style="margin:0">ENGECEMA</div>
            <div style="cursor:pointer;" onclick="alert('Monitoramento IBM Cloudant Ativo.')">🔔</div>
        </div>

        <div class="card">
            <p id="msg-boas-vindas" style="color:#7f8c8d; margin:0; font-size: 14px;">Olá, Usuário</p>
            <h1 id="saldo" style="color:var(--dark); margin:5px 0; font-size: 38px;">R$ 142.880,50</h1>
            <small style="color:var(--emerald)">● Global Account Verified</small>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="solicitarAcao('Pix', 500)"><span>💠</span>Pix</div>
            <div class="service-item" onclick="solicitarAcao('Câmbio Internacional', 15000)"><span>🌍</span>Câmbio Int.</div>
            <div class="service-item" onclick="solicitarAcao('Investimento', 1000)"><span>📈</span>Investir</div>
            <div class="service-item" onclick="alert('Seus Cartões ENGECEMA estão ativos.')"><span>💳</span>Cartões</div>
        </div>

        <h3 style="margin-top:30px;">Histórico</h3>
        <div id="extrato" class="card" style="border-left-color: #3498db; font-size:13px;">Sincronizando...</div>
        <button onclick="location.reload()" style="width:100%; background:#eee; border:none; padding:12px; border-radius:20px; cursor:pointer; margin-top:20px; font-weight:bold;">Sair</button>
    </div>

    <!-- MOTOR DE SEGURANÇA MFA -->
    <div id="modal-seguranca" class="modal">
        <div class="modal-content">
            <h3 id="mfa-titulo" style="color:var(--emerald); margin-top:0;">Segurança ENGECEMA</h3>
            <p id="mfa-desc" style="font-size:14px;"></p>
            <div id="mfa-corpo"></div>
            <button class="btn-action" onclick="confirmarOperacao()">Confirmar</button>
            <button onclick="fecharMFA()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        // MANTENDO FUNÇÕES DE MÁSCARA E NAVEGAÇÃO
        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // NOVO FLUXO DE ONBOARDING
        function enviarTokenCadastro() {
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            if(!nome || !email) return alert("Por favor, preencha nome e e-mail.");
            
            document.getElementById('token-msg').textContent = "Código enviado para: " + email;
            document.getElementById('msg-boas-vindas').textContent = "Olá, " + nome;
            mudarTela('screen-token');
        }

        function validarTokenEAtivar() {
            const token = document.getElementById('input-token').value;
            if(token.length < 6) return alert("Digite o código de 6 dígitos enviado.");
            
            alert("E-mail Validado! Bem-vindo à ENGECEMA.");
            mudarTela('screen-dash');
            document.getElementById('extrato').innerHTML = "● Hoje - Abertura de Conta: + R$ 0,00<br>● IBM Cloudant - Status: Sincronizado";
        }

        // LÓGICA DE LOGIN E SEGURANÇA (MANTIDA)
        function fluxoLogin() {
            mudarTela('screen-dash');
        }

        let acaoPendente = null;
        function solicitarAcao(tipo, valor) {
            acaoPendente = { tipo, valor };
            const m = document.getElementById('modal-seguranca');
            m.style.display = 'flex';
            document.getElementById('mfa-desc').textContent = "Valide sua Biometria ENGECEMA para: " + tipo;
            document.getElementById('mfa-corpo').innerHTML = `<div style="font-size:50px; margin:20px 0;">🛡️</div>`;
        }

        function confirmarOperacao() {
            alert(`Sucesso! Operação de ${acaoPendente.tipo} processada pela IBM Cloud.`);
            fecharMFA();
        }

        function fecharMFA() { document.getElementById('modal-seguranca').style.display = 'none'; }
    </script>
</body>
</html>
