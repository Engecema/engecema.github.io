<!-- Substituição Total para a #123: Extrato Dinâmico -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME_FANTASIA_AQUI | Extrato</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --danger: #ff4d4d; --card: #112240; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--primary); color: #fff; }
        .app-container { padding: 20px; max-width: 400px; margin: 0 auto; }
        .main-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .balance { font-size: 2.2rem; font-weight: 800; color: var(--success); margin: 10px 0; }
        
        /* Estilo do Extrato */
        .extrato-container { margin-top: 30px; text-align: left; }
        .extrato-title { font-size: 0.9rem; color: #8892b0; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .transacao { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #233554; }
        .transacao:last-child { border-bottom: none; }
        .transacao-info { font-size: 0.9rem; font-weight: 500; }
        .transacao-data { font-size: 0.7rem; color: #495670; }
        .valor-negativo { color: var(--danger); font-weight: 700; }
        .valor-positivo { color: var(--success); font-weight: 700; }
        
        .btn-pix { background: var(--accent); color: #000; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header style="padding-bottom: 20px;"><img src="logo.png" alt="Logo" style="max-width: 100px;"></header>
        
        <main class="main-card">
            <div style="color: #8892b0; font-size: 0.8rem; text-align: center;">Saldo Disponível</div>
            <div class="balance" style="text-align: center;">R$ 1.550,50</div>
            
            <button class="btn-pix" onclick="alert('Iniciando Fluxo Pix...')">NOVO PIX</button>

            <div class="extrato-container">
                <div class="extrato-title">Últimas Atividades</div>
                
                <!-- Item de Extrato (Vindo do Cloudant) -->
                <div class="transacao">
                    <div>
                        <div class="transacao-info">Pix Enviado</div>
                        <div class="transacao-data">17 Mar 2026 - 14:30</div>
                    </div>
                    <div class="valor-negativo">- R$ 50,00</div>
                </div>

                <div class="transacao">
                    <div>
                        <div class="transacao-info">Depósito Recebido</div>
                        <div class="transacao-data">16 Mar 2026 - 09:15</div>
                    </div>
                    <div class="valor-positivo">+ R$ 1.600,50</div>
                </div>
            </div>
        </main>

        <div style="margin-top: 40px; font-size: 0.7rem; color: #495670; text-align: center;">
            <strong>RAZAO_SOCIAL_AQUI</strong><br>
            CNPJ: 00.000.000/0001-00 | Action #123
        </div>
    </div>

</body>
</html>
