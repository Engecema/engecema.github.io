<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME_FANTASIA_AQUI | Internet Banking</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #003366; --success: #2e7d32; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        header { background: #fff; width: 100%; padding: 15px 0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { max-width: 140px; }
        
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-top: 20px; }
        .welcome { color: #666; font-size: 0.9rem; margin-bottom: 5px; }
        .user-name { font-weight: bold; color: var(--primary); font-size: 1.2rem; }
        .balance-label { margin-top: 20px; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .balance-value { font-size: 2.2rem; font-weight: 700; color: var(--success); margin: 5px 0; }
        
        .footer-info { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; font-size: 0.8rem; color: #777; }
        .tag { display: inline-block; padding: 3px 8px; background: #e3f2fd; color: #1565c0; border-radius: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
    </header>

    <main class="card">
        <div class="welcome">Bem-vindo(a),</div>
        <div id="nome-cliente" class="user-name">Carregando usuário...</div>

        <div class="balance-label">Saldo Disponível</div>
        <div class="balance-value">R$ <span id="saldo-atual">0,00</span></div>

        <div class="footer-info">
            <p><strong>Razão Social:</strong> RAZAO_SOCIAL_AQUI</p>
            <p><strong>CNPJ:</strong> 00.000.000/0001-00</p>
            <span class="tag">Conexão Segura: Cloudant V2</span>
        </div>
    </main>

    <script>
        // Lógica Limpa: Busca dados nas pastas 'usuarios' e 'transacoes'
        async function carregarDadosBancarios() {
            try {
                // O backend na IBM Cloud (Frente 3) faz a ponte usando os Secrets CLOUDANT_URL_V2
                const response = await fetch('/api/perfil'); 
                const data = await response.json();
                
                document.getElementById('nome-cliente').innerText = data.nome || "Cliente Engecema";
                document.getElementById('saldo-atual').innerText = data.saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            } catch (error) {
                console.error("Erro ao conectar com Cloudant:", error);
                document.getElementById('nome-cliente').innerText = "Erro na Conexão";
            }
        }
        window.onload = carregarDadosBancarios;
    </script>

</body>
</html>
