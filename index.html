<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate Digital Bank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; padding: 25px; text-align: center; border-top: 8px solid #0062ff; }
        .logo { color: #0062ff; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
        .user-info { margin-top: 20px; }
        .user-name { font-size: 1.1rem; color: #333; }
        .balance-label { font-size: 0.9rem; color: #666; margin-top: 15px; }
        .balance-value { font-size: 2.2rem; font-weight: bold; color: #000; margin: 5px 0; }
        .btn-pix { background: #0062ff; color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-pix:hover { background: #004cc4; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">INNOVATE BANK</div>
        <div class="user-info">
            <div class="user-name">Olá, <strong>Seu Nome</strong></div>
            <div class="balance-label">Saldo em conta corrente</div>
            <div class="balance-value">R$ 800,00</div>
        </div>
        <button class="btn-pix">Área Pix</button>
        <button class="btn-pix" style="background: #e9ecef; color: #333; margin-top: 10px;">Ver Extrato</button>
    </div>
</body>
</html>
