<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema | Engenharia e Construção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f4; color: #333; line-height: 1.6; }
        header { background: #003366; color: #fff; padding: 1rem 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { width: 80%; margin: auto; padding: 20px; }
        section { background: #fff; margin: 20px 0; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #003366; margin-bottom: 15px; }
        #formCadastro { display: flex; flex-direction: column; gap: 10px; max-width: 400px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0055aa; }
        #mensagemFeedback { margin-top: 10px; font-weight: bold; }
        footer { text-align: center; padding: 20px; background: #333; color: #fff; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>ENGECEMA</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#servicos">Serviços</a>
            <a href="#cadastro">Abrir Conta</a>
            <a href="admim.html">Admin</a>
        </nav>
    </header>

    <div class="container">
        <section id="home">
            <h2>Bem-vindo à Engecema</h2>
            <p>Soluções inteligentes em engenharia e gestão de obras.</p>
        </section>

        <section id="cadastro">
            <h2>Abrir Conta de Cliente</h2>
            <p>Cadastre-se para acompanhar seus projetos.</p>
            <form id="formCadastro">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="email" id="email" placeholder="Seu E-mail" required>
                <button type="submit">Finalizar Cadastro</button>
            </form>
            <div id="mensagemFeedback"></div>
        </section>
    </div>

    <footer>
        <p>&copy; 2024 Engecema - Todos os direitos reservados.</p>
    </footer>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('mensagemFeedback');
            feedback.innerText = "Conectando ao servidor Engecema...";
            feedback.style.color = "blue";

            // Dados estruturados conforme nossa integração Cloudant/AppConfig
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                // Chave de App gerada agora há pouco para o envio de e-mail
                auth_key: "skhk gugh efrg osqk", 
                origem: "engecema.github.io",
                data: new Date().toLocaleString("pt-BR")
            };

            try {
                // Rota configurada na IBM Cloud App Configuration
                // Lembre-se de substituir a URL e APIKEY abaixo pelas de sua Service Credential
                const urlServico = "COLE_AQUI_A_URL_DA_SUA_CREDENTIAL"; 
                const apiKey = "COLE_AQUI_A_APIKEY_DA_SUA_CREDENTIAL";

                const response = await fetch(urlServico, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    feedback.innerText = "Conta aberta com sucesso! Verifique seu e-mail.";
                    feedback.style.color = "green";
                    e.target.reset();
                } else {
                    throw new Error("Erro na resposta da IBM Cloud");
                }
            } catch (error) {
                feedback.innerText = "Erro de Servidor: Falha na autenticação ou conexão.";
                feedback.style.color = "red";
                console.error("Erro técnico:", error);
            }
        });
    </script>
</body>
</html>
