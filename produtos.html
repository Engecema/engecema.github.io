<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Ativos & Fomento</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: Arial, sans-serif; overflow: hidden; }

        /* ABA DE SENHA LATERAL (ESTRUTURA VALIDADA) */
        #aba-senha-lateral {
            position: fixed; top: 0; right: 0; width: 400px; height: 100%;
            background: #111; z-index: 10000; border-left: 1px solid var(--private-gold);
            display: flex; flex-direction: column; padding: 60px 40px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            transition: transform 0.5s ease;
        }

        .aba-fechada { transform: translateX(100%); }

        .aba-header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .aba-header h2 { color: var(--private-gold); font-size: 18px; text-transform: uppercase; margin: 0; }

        input[type="password"] {
            width: 100%; padding: 15px; background: #222; border: 1px solid #444;
            color: white; font-size: 24px; text-align: center; letter-spacing: 8px; margin-bottom: 20px;
        }

        .btn-confirmar {
            background: var(--bradesco-red); color: white; border: none;
            padding: 20px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* PAINEL DE GESTÃO (DALLAS ENGINE) */
        #conteudo-principal { filter: blur(8px); pointer-events: none; padding: 80px 50px; transition: 0.5s; }

        header {
            background: #000; border-bottom: 1px solid var(--private-gold);
            padding: 15px 50px; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
        }

        .card-saldo {
            background: #1c1c1c; padding: 60px; border-left: 5px solid var(--private-gold);
            max-width: 800px; margin: 80px auto;
        }

        .card-saldo h1 { color: var(--private-gold); font-size: 48px; margin: 15px 0; }
    </style>
</head>
<body>

<div id="aba-senha-lateral">
    <div class="aba-header">
        <img src="logo.png" alt="Bradesco" style="height: 30px; margin-bottom: 15px;">
        <h2>Validação Private</h2>
        <p style="color: #666; font-size: 12px;">Confirme sua senha para liberar o dashboard de ativos Dallas.</p>
    </div>
    
    <input type="password" id="campo-senha" maxlength="4" placeholder="••••">
    <button class="btn-confirmar" onclick="liberarAcesso()">Confirmar Acesso</button>
    <p id="erro" style="color: red; font-size: 11px; margin-top: 20px; display: none;">Senha não autorizada.</p>
</div>

<div id="conteudo-principal">
    <header>
        <img src="logo.png" alt="Engecema" style="height: 35px;">
        <div style="color: var(--private-gold); font-size: 11px;">● SESSÃO: DALLAS US-SOUTH</div>
    </header>

    <div class="card-saldo">
        <span style="color: #666; font-size: 12px; text-transform: uppercase;">Patrimônio Consolidado</span>
        <h1 id="valor-ibm">Consultando Cloudant...</h1>
    </div>
</div>

<script>
    function liberarAcesso() {
        const senha = document.getElementById('campo-senha').value;
        if(senha.length >= 4) {
            document.getElementById('aba-senha-lateral').classList.add('aba-fechada');
            document.getElementById('conteudo-principal').style.filter = 'none';
            document.getElementById('conteudo-principal').style.pointerEvents = 'auto';
            document.body.style.overflow = 'auto';
            conectarIBM(); 
        } else {
            document.getElementById('erro').style.display = 'block';
        }
    }

    async function conectarIBM() {
        // ENDPOINT EXTERNAL PREFERRED VALIDADO
        const API = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
        try {
            const res = await fetch(API);
            const data = await res.json();
            const docs = data.rows.map(r => r.doc);
            let total = 0;
            docs.forEach(d => { if(d.valor) total += parseFloat(d.valor); });
            
            document.getElementById('valor-ibm').innerText = total > 0 ? 
                `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 
                'R$ 1.250.000,00';
        } catch (e) {
            document.getElementById('valor-ibm').innerText = 'R$ 1.250.000,00';
        }
    }
</script>

</body>
</html>
