<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Validação Dallas</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body { background: var(--dark); margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

        /* ABA DE SEGURANÇA (SENHA E CONFIRMAÇÃO) */
        #aba-seguranca {
            position: fixed; top: 0; right: 0; width: 400px; height: 100vh;
            background: #111; z-index: 9999; border-left: 2px solid var(--gold);
            display: flex; flex-direction: column; padding: 60px 40px;
            box-shadow: -20px 0 70px #000; color: #fff;
        }
        input { width: 100%; padding: 20px; background: #000; border: 1px solid #333; color: var(--gold); font-size: 32px; text-align: center; letter-spacing: 10px; margin: 30px 0; outline: none; }
        button { width: 100%; padding: 20px; background: var(--red); color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* PAINEL DE GESTÃO (BLUR ATÉ VALIDAR) */
        #painel-dallas { filter: blur(15px); padding: 80px 50px; transition: 0.8s; }
        .card-saldo { background: #1c1c1c; padding: 60px; border-left: 5px solid var(--gold); max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>

<div id="aba-seguranca">
    <div id="etapa-1">
        <h2 id="titulo-aba" style="color:var(--gold)">SENHA DE ACESSO</h2>
        <p id="subtitulo-aba" style="color:#666; font-size:12px;">Informe sua senha de 4 dígitos.</p>
        <input type="password" id="p1" maxlength="4" placeholder="••••">
        <button onclick="proximaEtapa()">Avançar</button>
    </div>
</div>

<div id="painel-dallas">
    <div class="card-saldo">
        <span style="color:#555; text-transform:uppercase; font-size:11px;">Patrimônio Consolidado</span>
        <h1 id="valor-ibm" style="color:var(--gold); font-size:48px;">R$ 1.250.000,00</h1>
    </div>
</div>

<script>
    let senhaTemporaria = "";

    function proximaEtapa() {
        const p1 = document.getElementById('p1').value;
        if(p1.length === 4) {
            senhaTemporaria = p1;
            document.getElementById('titulo-aba').innerText = "CONFIRMAR SENHA";
            document.getElementById('subtitulo-aba').innerText = "Repita a senha para validar.";
            document.getElementById('p1').value = "";
            document.querySelector('button').innerText = "Confirmar e Entrar";
            document.querySelector('button').onclick = validarFinal;
        }
    }

    function validarFinal() {
        const p2 = document.getElementById('p1').value;
        if(p2 === senhaTemporaria) {
            document.getElementById('aba-seguranca').style.display = 'none';
            document.getElementById('painel-dallas').style.filter = 'none';
            conectarCloudant();
        } else {
            alert("Senhas não conferem.");
            location.reload();
        }
    }

    async function conectarCloudant() {
        const API = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
        try {
            const res = await fetch(API);
            const data = await res.json();
            let total = 0;
            data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
            if(total > 0) document.getElementById('valor-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        } catch(e) { console.log("Offline Dallas"); }
    }
</script>
</body>
</html>
