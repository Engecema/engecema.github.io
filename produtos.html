<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco Private | Internet Banking</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
            --card-gray: #1c1c1c;
            --white: #ffffff;
        }

        body { background-color: var(--bg-dark); color: #d1d1d1; font-family: Arial, sans-serif; margin: 0; overflow: hidden; }

        /* CAMADA DE SENHA (OVERLAY) */
        #camada-seguranca {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #111;
            padding: 40px;
            border-top: 4px solid var(--bradesco-red);
            text-align: center;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .login-box h3 { color: var(--private-gold); text-transform: uppercase; font-size: 14px; margin-bottom: 25px; }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #333;
            color: white;
            text-align: center;
            font-size: 18px;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .btn-acessar {
            width: 100%;
            padding: 15px;
            background: var(--bradesco-red);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* CONTEÚDO DO PAINEL (ESCONDIDO INICIALMENTE) */
        #painel-conteudo { display: none; padding-top: 70px; }

        header {
            background: #000; border-bottom: 1px solid var(--private-gold);
            padding: 15px 50px; display: flex; justify-content: space-between;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .summary-card {
            background: var(--card-gray); padding: 40px;
            border-left: 4px solid var(--private-gold); margin: 50px;
        }

        .summary-card h2 { color: var(--private-gold); font-size: 42px; margin: 0; }
    </style>
</head>
<body>

<!-- 1. TELA DE SENHA INTERCEPTADORA -->
<div id="camada-seguranca">
    <div class="login-box">
        <img src="logo.png" alt="Bradesco" style="height: 30px; margin-bottom: 20px;">
        <h3>Validação de Acesso Private</h3>
        <input type="password" id="senha-acesso" placeholder="••••••" maxlength="6">
        <button class="btn-acessar" onclick="validarSenha()">Confirmar Acesso</button>
        <p id="erro-msg" style="color: red; font-size: 11px; margin-top: 15px; display: none;">Senha incorreta. Tente novamente.</p>
    </div>
</div>

<!-- 2. PAINEL DE GESTÃO (SÓ APARECE APÓS SENHA) -->
<div id="painel-conteudo">
    <header>
        <img src="logo.png" alt="Bradesco Private" style="height: 35px;">
        <div style="color: var(--private-gold); font-size: 11px;">● SESSÃO SEGURA: DALLAS (US-SOUTH)</div>
    </header>

    <div class="summary-card">
        <span style="font-size: 10px; color: #666; text-transform: uppercase;">Saldo Consolidado</span>
        <h2 id="saldo-corrente">R$ 0,00</h2>
    </div>
</div>

<script>
    // FUNÇÃO DE VALIDAÇÃO
    function validarSenha() {
        const senha = document.getElementById('senha-acesso').value;
        
        // Defina aqui a senha de teste ou lógica de validação
        if (senha === "123456" || senha.length >= 4) { 
            document.getElementById('camada-seguranca').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'block';
            document.body.style.overflow = 'auto';
            fetchData(); // Só busca dados da IBM Cloud após a senha
        } else {
            document.getElementById('erro-msg').style.display = 'block';
        }
    }

    // INTEGRAÇÃO IBM CLOUDANT
    const API_ENDPOINT = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';

    async function fetchData() {
        try {
            const response = await fetch(API_ENDPOINT);
            const result = await response.json();
            const docs = result.rows.map(row => row.doc);

            let total = 0;
            docs.forEach(doc => { if(doc.valor) total += parseFloat(doc.valor); });

            document.getElementById('saldo-corrente').innerText = total > 0 ? 
                `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 
                'R$ 1.250.000,00';
        } catch (error) {
            document.getElementById('saldo-corrente').innerText = 'R$ 1.250.000,00';
        }
    }
</script>

</body>
</html>
