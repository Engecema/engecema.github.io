<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Dallas Engine</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body { background: var(--dark); margin: 0; overflow: hidden; font-family: Arial, sans-serif; display: flex; justify-content: flex-end; }
        
        /* ABA DE SEGURANÇA DALLAS (DUAS ETAPAS) */
        #aba-private-seguranca {
            width: 410px; height: 100vh; background: #111; z-index: 999999; 
            border-left: 2px solid var(--gold); display: flex; flex-direction: column; 
            padding: 60px 40px; box-shadow: -20px 0 70px #000; color: #fff; box-sizing: border-box;
        }

        .aba-header img { height: 30px; margin-bottom: 25px; }
        .aba-header h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin: 0; }
        
        input { 
            width: 100%; padding: 20px; background: #000; border: 1px solid #333; 
            color: var(--gold); font-size: 32px; text-align: center; letter-spacing: 12px; 
            margin: 35px 0; outline: none; border-radius: 4px; 
        }

        button { 
            width: 100%; padding: 22px; background: var(--red); color: #fff; 
            border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px;
        }

        /* CONTEÚDO DO PAINEL (BLUR ATÉ A SENHA) */
        #painel-fomento { display: none; width: 100vw; height: 100vh; padding: 100px; box-sizing: border-box; filter: blur(10px); }
        .card-saldo { background: #1c1c1c; padding: 60px; border-left: 6px solid var(--gold); max-width: 800px; }
    </style>
</head>
<body>

<div id="aba-private-seguranca">
    <div class="aba-header">
        <img src="logo.png">
        <h2 id="tit-aba">Senha de Acesso</h2>
        <p id="sub-aba" style="color:#666; font-size:12px;">Identificação Dallas requerida. Informe sua senha de 4 dígitos.</p>
    </div>
    <input type="password" id="p-input" maxlength="4" placeholder="••••">
    <button id="btn-p" onclick="fluxoDallas()">Avançar</button>
</div>

<div id="painel-fomento">
    <div class="card-saldo">
        <span style="color:#555; text-transform:uppercase; font-size:11px; letter-spacing:3px;">Patrimônio Consolidado</span>
        <h1 id="valor-real-ibm" style="color:var(--gold); font-size:52px;">R$ 1.250.000,00</h1>
    </div>
</div>

<script>
    let s1 = "";
    function fluxoDallas() {
        const campo = document.getElementById('p-input');
        const val = campo.value;
        if(val.length === 4) {
            if(s1 === "") {
                // ETAPA 1: GRAVA SENHA E PEDE CONFIRMAÇÃO
                s1 = val;
                document.getElementById('tit-aba').innerText = "Confirmar Senha";
                document.getElementById('sub-aba').innerText = "Repita a senha para validar a operação de segurança.";
                campo.value = "";
                document.getElementById('btn-p').innerText = "Confirmar e Entrar";
            } else if(val === s1) {
                // ETAPA 2: LIBERA O SALDO IBM
                document.getElementById('aba-private-seguranca').style.display = "none";
                document.getElementById('painel-fomento').style.display = "block";
                setTimeout(() => { document.getElementById('painel-fomento').style.filter = "none"; }, 100);
                buscarSaldoIBM();
            } else {
                alert("As senhas não conferem."); location.reload();
            }
        }
    }

    async function buscarSaldoIBM() {
        try {
            const res = await fetch('https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud');
            const data = await res.json();
            let total = 0;
            data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
            document.getElementById('valor-real-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        } catch(e) { console.log("Erro IBM"); }
    }
</script>

</body>
</html>
