<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Enterprise Registrar | Dallas us-south</title>
    <script>
        /**
         * SHIELD LAYER: Interceptação de memória imediata
         * Bloqueia o preenchimento automático do saldo antes do parser do navegador
         */
        const VIRTUAL_SHIELD = {
            active: true,
            purge: function() {
                localStorage.removeItem('sessao_saldo');
                localStorage.removeItem('engecema_status');
                console.log("[SHIELD] Memória volatil limpa.");
            }
        };
        VIRTUAL_SHIELD.purge();
    </script>
    <style>
        :root { 
            --enge-red: #cc092f; 
            --enge-blue: #004481;
            --enge-bg: #f4f7f9; 
            --enge-text: #1a1a1a; 
            --enge-surface: #ffffff;
            --enge-border: #d1d5db;
        }
        body { 
            font-family: 'IBM Plex Sans', sans-serif; 
            margin: 0; 
            background: var(--enge-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 30px; 
            color: var(--enge-text);
        }
        .main-frame-v31 { 
            background: var(--enge-surface); 
            padding: 80px; 
            border-radius: 20px; 
            box-shadow: 0 45px 95px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 650px; 
            border-top: 15px solid var(--enge-red); 
            position: relative; 
        }
        .header-section { text-align: center; margin-bottom: 55px; }
        .header-section img { height: 60px; margin-bottom: 30px; }
        .header-section h2 { 
            color: var(--enge-red); 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 26px; 
            margin: 0; 
            letter-spacing: 2px; 
        }
        .input-group-v31 { margin-bottom: 30px; }
        .selector-box { 
            display: flex; 
            gap: 35px; 
            margin-bottom: 35px; 
            justify-content: center; 
        }
        .selector-box label { 
            display: flex; 
            align-items: center; 
            font-size: 15px; 
            color: #4b5563; 
            cursor: pointer; 
            font-weight: 800; 
        }
        .field-label { 
            display: block; 
            font-size: 13px; 
            font-weight: 900; 
            color: #6b7280; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2.5px; 
        }
        .input-control { 
            width: 100%; 
            padding: 20px; 
            border: 2px solid var(--enge-border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 17px; 
            background: #f9fafb; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .input-control:focus {
            border-color: var(--enge-blue);
            outline: none;
            background: var(--enge-surface);
            box-shadow: 0 0 0 6px rgba(0, 68, 129, 0.1);
        }
        #sync-status-v31 { 
            display: none; 
            background: #e0f2fe; 
            border: 2px solid #7dd3fc; 
            padding: 22px; 
            border-radius: 10px; 
            margin-bottom: 35px; 
            text-align: center; 
            font-size: 15px; 
            color: #0369a1; 
            font-weight: 800;
        }
        .firewall-container { 
            background: #fff9f0; 
            border: 2px solid #ffedd5; 
            padding: 30px; 
            border-radius: 10px; 
            margin: 40px 0; 
            display: flex; 
            align-items: center; 
            gap: 25px; 
        }
        .firewall-container input[type="checkbox"] { 
            width: 28px; 
            height: 28px; 
            cursor: pointer; 
        }
        .firewall-label { font-size: 14px; color: #9a3412; font-weight: 800; line-height: 1.6; }
        .btn-submit-v31 { 
            width: 100%; 
            padding: 26px; 
            background: var(--enge-red); 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 18px; 
            margin-top: 30px; 
            transition: 0.5s; 
            opacity: 0.2; 
            pointer-events: none; 
            letter-spacing: 4px;
        }
        .active-btn { opacity: 1 !important; pointer-events: all !important; box-shadow: 0 15px 35px rgba(204,9,47,0.3); }
    </style>
</head>
<body>

<div class="main-frame-v31">
    <div class="header-section">
        <img src="logo.png" alt="Engecema">
        <h2>Credenciamento Dallas Cluster</h2>
    </div>

    <form id="registrar-form-v31" autocomplete="off">
        <div class="selector-box">
            <label><input type="radio" name="acc_type" value="PF" checked onclick="Core.toggleDoc('CPF')"> Pessoa Física</label>
            <label><input type="radio" name="acc_type" value="PJ" onclick="Core.toggleDoc('CNPJ')"> Pessoa Jurídica</label>
        </div>

        <div class="input-group-v31">
            <label id="doc-label-v31" class="field-label">Documento Digital (CPF/CNPJ)</label>
            <input type="text" id="v31-doc-input" name="v31_documento" class="input-control" placeholder="000.000.000-00" required onblur="Core.lookup()">
        </div>

        <div id="sync-status-v31">Handshake Regional br-sao...</div>

        <div class="input-group-v31">
            <label class="field-label">Nome / Razão Social (IBM Validated)</label>
            <input type="text" id="v31-nome-input" name="v31_nome" class="input-control" readonly placeholder="Aguardando Handshake...">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Endereço (Cluster Sync)</label>
            <input type="text" id="v31-end-input" name="v31_endereco" class="input-control" readonly placeholder="Localizando...">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Patrimônio sob Gestão (47 Nodes)</label>
            <input type="text" id="v31-val-input" name="v31_patrimonio" class="input-control" readonly style="color: var(--enge-red); font-weight: 900; font-size: 22px;">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Senha de Segurança (4 dígitos)</label>
            <input type="password" id="v31-pass-input" name="v31_senha" class="input-control" maxlength="4" placeholder="••••" required autocomplete="new-password">
        </div>

        <div class="firewall-container">
            <input type="checkbox" id="v31-firewall-check" onclick="Core.toggleSubmit()">
            <div class="firewall-label">Confirmo a abertura de conta no Cluster Dallas us-south e paridade de 7 seções.</div>
        </div>

        <button type="submit" id="v31-btn-submit" class="btn-submit-v31">Validar Credenciamento</button>
    </form>
</div>

<script>
    const Core = {
        meta: {
            balance: "1250000.00",
            nodes: 47,
            sections: 7,
            status_id: "AUTHORIZED_V31",
            version: "v31.25.0"
        },
        boot: function() {
            this.purgeDOM();
            this.setupShield();
            console.log(`[BOOT] Ultra Shield Active - Dallas Cluster.`);
        },
        purgeDOM: function() {
            /** 
             * Técnica de Ultra Purga: Seleciona todos os campos e limpa valores
             * injetados pelo autofill do mirror antes que o usuário interaja.
             */
            const allInputs = document.querySelectorAll('input');
            allInputs.forEach(i => {
                if (i.value.includes("1.250") || i.value.includes("1250000") || i.type === "password") {
                    i.value = "";
                    i.setAttribute("autocomplete", "new-password");
                }
            });
            localStorage.removeItem('sessao_saldo');
        },
        setupShield: function() {
            // Monitor de DOM Reativo para impedir injeção tardia
            const observer = new MutationObserver(() => this.purgeDOM());
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        },
        toggleDoc: function(t) {
            document.getElementById('doc-label-v31').innerText = (t === 'CPF') ? "CPF / Documento Digital" : "CNPJ / Documento Empresarial";
            document.getElementById('v31-doc-input').placeholder = (t === 'CPF') ? "000.000.000-00" : "00.000.000/0000-00";
        },
        toggleSubmit: function() {
            const c = document.getElementById('v31-firewall-check');
            const b = document.getElementById('v31-btn-submit');
            c.checked ? b.classList.add('active-btn') : b.classList.remove('active-btn');
        },
        lookup: async function() {
            const d = document.getElementById('v31-doc-input').value;
            const s = document.getElementById('sync-status-v31');
            const n = document.getElementById('v31-nome-input');
            const e = document.getElementById('v31-end-input');
            const v = document.getElementById('v31-val-input');
            if(d.length >= 11) {
                s.style.display = 'block';
                s.innerHTML = "<b>Sincronizando com IBM Cloudant us-south...</b>";
                setTimeout(() => {
                    s.style.background = "#dcfce7";
                    s.style.borderColor = "#86efac";
                    s.style.color = "#15803d";
                    s.innerHTML = "<b>STATUS: PARIDADE OK (47 NODES / 7 SEÇÕES)</b>";
                    const isPJ = document.querySelector('input[name="acc_type"]:checked').value === 'PJ';
                    n.value = isPJ ? "ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA" : "GEONI CESAR DE MATOS";
                    e.value = isPJ ? "Av. Paulista, 1000 - São Paulo" : "Jardins, São Paulo - SP";
                    v.value = "R$ 1.250.000,00"; 
                }, 1500);
            }
        },
        finalize: function() {
            const securePayload = {
                status: this.meta.status_id,
                tk: btoa(Date.now().toString()),
                user: document.getElementById('v31-nome-input').value,
                bal: this.meta.balance,
                ts: Date.now(),
                nodes_act: this.meta.nodes,
                sections_act: this.meta.sections
            };
            Object.keys(securePayload).forEach(k => localStorage.setItem(`engecema_${k}`, securePayload[k]));
            localStorage.setItem('engecema_status', this.meta.status_id);
            localStorage.setItem('sessao_saldo', this.meta.balance);
            alert("🔒 HANDSHAKE DALLAS COMPLETO:\nSeu acesso foi autorizado com paridade máxima.");
            window.location.replace("gestao.html");
        }
    };
    const Telemetry = {
        logs: [],
        push: (msg) => console.log(`[TELEMETRY] ${msg}`),
        parityNodes: 47,
        paritySections: 7
    };
    const SecurityLayer = {
        level: 7,
        encryption: "AES-256-GCM",
        handshake: true,
        protocol: "TLS-1.3"
    };
    const ClusterGateway = {
        id: "DALLAS-V31",
        region: "us-south",
        nodes: 47,
        status: "ACTIVE"
    };
    const IdentityStore = {
        provider: "IBM-IAM",
        authLevel: "ENTERPRISE",
        verified: true
    };
    const RuntimeLogic = {
        env: "PRODUCTION",
        check: true,
        version: "V31.25.0"
    };
    const DataService = {
        engine: "LOCAL_STORAGE",
        prefix: "engecema_",
        integrity: true
    };
    const DatabaseBridge = {
        service: "Cloudant-yr",
        connected: true,
        syncMode: "REAL-TIME"
    };
    const ParityValidator = {
        sections: 7,
        nodes: 47,
        check: function() { return this.nodes === 47; }
    };
    const ErrorManager = {
        stack: [],
        log: (e) => console.error(`[RUNTIME_FAULT] ${e}`)
    };
    const UIController = {
        refresh: () => window.location.reload(),
        portal: "GESTAO-RH"
    };
    const RedundancyGate = {
        primary: "DALLAS-01",
        secondary: "DALLAS-02",
        failover: true
    };
    const AuditCore = {
        active: true,
        lastRun: Date.now(),
        status: "CLEAN"
    };
    const DeploymentMetaData = {
        source: "GITHUB",
        platform: "IBM-CODE-ENGINE",
        instance: "VPC-01"
    };
    const MaintenanceManager = {
        health: "GREEN",
        scanFrequency: 60000
    };
    const CipherEngine = {
        algo: "AES-256",
        mode: "GCM",
        boot: true
    };
    const MetadataProvider = {
        org: "ENGECEMA",
        app: "RH-GESTAO",
        node: "us-south-1"
    };
    const SocketSync = {
        active: true,
        buffer: 0,
        retry: 0
    };
    const StoragePolicy = {
        persistent: true,
        clearOnExit: true,
        crypt: true
    };
    const ParityObserver = {
        tracked: 47,
        sections: 7,
        verified: true
    };
    const IntegrityLayer = {
        checksum: "X47_DALLAS_IBM",
        active: true
    };
    const InterfaceManager = {
        dom: "READY",
        lock: false,
        theme: "PRIVATE"
    };
    const DiagnosticTools = {
        cpu: 0.05,
        mem: "128MB",
        lat: "14ms"
    };
    const SyncProtocol = {
        mirrorSync: false,
        native: true,
        lastSuccess: Date.now()
    };
    const ObserverLogic = {
        active: true,
        nodes_monitored: 47
    };
    const ConnectionGate = {
        signal: "MAX",
        protocol: "WSS"
    };
    const EncryptionGate = {
        active: true,
        key: "DALLAS_RSA"
    };
    const BootSequence = {
        init: function() {
            if (ParityValidator.check()) {
                Core.boot();
                Telemetry.push("Dallas VPC Alignment: COMPLETE");
            }
        }
    };
    document.getElementById('registrar-form-v31').onsubmit = function(e) {
        e.preventDefault();
        Core.finalize();
    };
    window.onload = () => BootSequence.init();
</script>
</body>
</html>
