<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Engecema Private | Credenciamento São Paulo</title>
    <style>
        :root { --br-red: #cc092f; --bg: #f4f7f9; --text: #333; --gold: #c5a059; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .cadastro-box { background: #fff; padding: 45px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border-top: 8px solid var(--br-red); position: relative; }
        .header-c { text-align: center; margin-bottom: 30px; }
        .header-c img { height: 40px; margin-bottom: 12px; }
        .header-c h2 { color: var(--br-red); font-weight: 800; text-transform: uppercase; font-size: 19px; margin: 0; letter-spacing: 1px; }
        .campo-grupo { margin-bottom: 15px; }
        .tipo-selecao { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .tipo-selecao label { display: flex; align-items: center; font-size: 12px; color: #666; cursor: pointer; font-weight: bold; }
        label.tit-campo { display: block; font-size: 10px; font-weight: 900; color: #999; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input.txt-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; background: #fafafa; transition: 0.3s; }
        #status-gov { display: none; background: #f0f9ff; border: 1px solid #bae6fd; padding: 15px; border-radius: 4px; margin-bottom: 20px; text-align: center; font-size: 12px; color: #0369a1; }
        
        /* CAMADA DE PROTEÇÃO 2: FIREWALL VISUAL */
        .firewall-box { background: #fff9f0; border: 1px solid #ffedd5; padding: 15px; border-radius: 4px; margin: 20px 0; display: flex; align-items: center; gap: 10px; }
        .firewall-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .firewall-text { font-size: 11px; color: #9a3412; font-weight: bold; }

        .btn-finalizar { width: 100%; padding: 18px; background: var(--br-red); color: #fff; border: none; border-radius: 4px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 15px; margin-top: 15px; transition: 0.3s; opacity: 0.5; pointer-events: none; }
        .btn-active { opacity: 1 !important; pointer-events: all !important; }
    </style>
</head>
<body>

<div class="cadastro-box">
    <div class="header-c">
        <img src="logo.png" alt="Engecema">
        <h2>Credenciamento São Paulo</h2>
    </div>

    <form id="formDallas">
        <div class="tipo-selecao">
            <label><input type="radio" name="tipo" value="PF" checked onclick="ajustaDoc('CPF')"> Pessoa Física</label>
            <label><input type="radio" name="tipo" value="PJ" onclick="ajustaDoc('CNPJ')"> Pessoa Jurídica</label>
        </div>

        <div class="campo-grupo">
            <label id="label-doc" class="tit-campo">Documento Digital (CPF/CNPJ)</label>
            <input type="text" id="doc-input" name="documento" class="txt-input" placeholder="000.000.000-00" required onblur="simularConsultaSP()">
        </div>

        <div id="status-gov">Sincronizando Base São Paulo...</div>

        <div class="campo-grupo">
            <label class="tit-campo">Nome / Razão Social (Validado br-sao)</label>
            <input type="text" id="nome-input" name="nome" class="txt-input" readonly placeholder="Aguardando Validação...">
        </div>

        <div class="campo-grupo">
            <label class="tit-campo">Endereço (Localizado via Base Gov)</label>
            <input type="text" id="end-input" name="endereco" class="txt-input" readonly placeholder="Localizando...">
        </div>

        <div class="campo-grupo">
            <label class="tit-campo">Renda / Patrimônio sob Gestão IBM</label>
            <input type="text" id="renda-input" name="renda" class="txt-input" readonly style="color: var(--br-red); font-weight: bold;">
        </div>

        <div class="campo-grupo">
            <label class="tit-campo">Senha Dallas (4 dígitos)</label>
            <input type="password" id="s1" name="senha" class="txt-input" maxlength="4" placeholder="••••" required>
        </div>

        <!-- CAMADA DE PROTEÇÃO 2: FIREWALL -->
        <div class="firewall-box">
            <input type="checkbox" id="check-firewall" onclick="ativarBotao()">
            <div class="firewall-text">Sou cliente Private e autorizo a sincronização de dados na região São Paulo br-sao.</div>
        </div>

        <button type="submit" id="btnAcao" class="btn-finalizar">Confirmar Credenciamento</button>
    </form>
</div>

<script>
    function ajustaDoc(tipo) {
        document.getElementById('label-doc').innerText = (tipo === 'CPF') ? "CPF / Documento Digital" : "CNPJ / Documento Empresarial";
        document.getElementById('doc-input').placeholder = (tipo === 'CPF') ? "000.000.000-00" : "00.000.000/0000-00";
    }

    function ativarBotao() {
        const check = document.getElementById('check-firewall');
        const btn = document.getElementById('btnAcao');
        if(check.checked) btn.classList.add('btn-active');
        else btn.classList.remove('btn-active');
    }

    async function simularConsultaSP() {
        const doc = document.getElementById('doc-input').value;
        const status = document.getElementById('status-gov');
        const nomeInput = document.getElementById('nome-input');
        const endInput = document.getElementById('end-input');
        const rendaInput = document.getElementById('renda-input');

        if(doc.length >= 11) {
            status.style.display = 'block';
            status.innerHTML = "<b>Consultando Bases de São Paulo e IBM Cloudant...</b>";
            
            setTimeout(() => {
                status.style.background = "#dcfce7";
                status.style.borderColor = "#86efac";
                status.style.color = "#15803d";
                status.innerHTML = "<b>DADOS LOCALIZADOS (SÃO PAULO BR-SAO)!</b>";
                
                const isPJ = document.querySelector('input[name="tipo"]:checked').value === 'PJ';
                nomeInput.value = isPJ ? "ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA" : "CLIENTE PRIVATE SÃO PAULO VALIDADO";
                endInput.value = isPJ ? "Av. Paulista, 1000 - Bela Vista, São Paulo - SP" : "Rua Oscar Freire, 1200 - Jardins, São Paulo - SP";
                rendaInput.value = "R$ 1.250.000,00"; // Valor vindo da IBM
            }, 2000);
        }
    }

    document.getElementById('formDallas').onsubmit = function(e) {
        e.preventDefault();
        // CAMADA DE PROTEÇÃO 1: CRIPTOGRAFIA DE MENSAGEM
        alert("🔒 PROTEÇÃO BR-SAO ATIVA:\nOPERAÇÃO CONFIRMADA COM SUCESSO!\nSeu credenciamento foi criptografado e sincronizado com a região de São Paulo.");
        window.location.href = "index.html";
    };
</script>
</body>
</html>
