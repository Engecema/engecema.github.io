<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ENGECEMA | Gestão Comercial</title>
    <style>
        :root { --emerald: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        .sidebar { width: 260px; background: var(--dark); height: 100vh; color: white; padding: 25px; position: fixed; }
        .main { margin-left: 310px; padding: 40px; width: calc(100% - 350px); }
        
        .header-adm { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 4px solid var(--emerald); }
        
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; background: #fef3c7; color: #92400e; }
        .btn-approve { background: var(--emerald); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-approve:hover { background: var(--dark); }
        .refresh-btn { background: white; border: 1px solid #ddd; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--emerald);">ENGECEMA</h2>
        <p style="opacity: 0.6; font-size: 13px;">Backoffice Comercial</p>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <p>🟢 Dashboard</p>
        <p>👤 Fila de Clientes</p>
        <p>📊 Relatórios</p>
        <p>⚙️ Configurações</p>
    </div>

    <div class="main">
        <div class="header-adm">
            <h1>Fila de Aprovação</h1>
            <button class="refresh-btn" onclick="carregarDados()">🔄 Atualizar Cloudant</button>
        </div>

        <div class="grid-stats">
            <div class="stat-card"><small>Cadastros Hoje</small><h2 id="count-total">...</h2></div>
            <div class="stat-card"><small>Em Análise</small><h2 style="color:#f39c12">R$ 1.8M</h2></div>
            <div class="stat-card"><small>Aprovados</small><h2 style="color:var(--emerald)">84</h2></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome Completo</th>
                    <th>CPF</th>
                    <th>E-mail</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <!-- DADOS DA IBM CLOUD ENTRARÃO AQUI -->
            </tbody>
        </table>
    </div>

    <script>
        // CREDENCIAIS OFICIAIS QUE JÁ VALIDAMOS
        const CONFIG_ADM = {
            API_KEY: "gZqvyCJogj3Pq7dRApq0hEAVN7HcNdUQH3BIqZgcc9tU",
            URL: "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudant.com"
        };

        async function carregarDados() {
            const auth = btoa("apikey:" + CONFIG_ADM.API_KEY);
            const tabela = document.getElementById('tabela-corpo');
            tabela.innerHTML = "<tr><td colspan='5' style='text-align:center'>Conectando à IBM Dallas...</td></tr>";

            try {
                const response = await fetch(`${CONFIG_ADM.URL}/_all_docs?include_docs=true`, {
                    headers: { 'Authorization': 'Basic ' + auth }
                });
                const data = await response.json();
                
                tabela.innerHTML = "";
                document.getElementById('count-total').innerText = data.total_rows;

                data.rows.forEach(item => {
                    const c = item.doc;
                    if(c.nome) { // Pula documentos de sistema
                        tabela.innerHTML += `
                            <tr>
                                <td><b>${c.nome}</b></td>
                                <td>${c.cpf}</td>
                                <td>${c.email}</td>
                                <td><span class="badge">${c.status || 'PENDENTE'}</span></td>
                                <td><button class="btn-approve" onclick="alert('Cliente ${c.nome} aprovado!')">Aprovar</button></td>
                            </tr>
                        `;
                    }
                });
            } catch (err) {
                tabela.innerHTML = "<tr><td colspan='5' style='color:red'>Erro de conexão com Cloudant. Verifique o CORS.</td></tr>";
            }
        }

        // Inicia a busca assim que abre
        window.onload = carregarDados;
    </script>
</body>
</html>
