<script>
    // CONFIGURAÇÃO TÉCNICA CORRIGIDA
    const API_KEY = "spU8hW5qypYJxNTKiv--OAndWnVsnC_f-ZjEmiK8I6wY"; 
    const HOST_IBM = "7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";
    const BANCO_MASTER = "master_engecema_sp";
    const BANCO_EQUIPE = "colaboradores_engecema";

    const credenciais_fixas = { "admin": "dallas2026", "gestor": "engecema2026" };

    function validarAcesso() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (credenciais_fixas[u] === p) {
            sessionStorage.setItem('sessao-ativa', 'sim');
            exibirPainel();
        } else { alert("Acesso Negado"); }
    }

    function exibirPainel() {
        document.getElementById('login-gestao').style.display = 'none';
        document.getElementById('painel-real').style.display = 'block';
        sincronizarTudo();
    }

    function sair() { sessionStorage.removeItem('sessao-ativa'); window.location.reload(); }

    window.onload = function() {
        if(sessionStorage.getItem('sessao-ativa') === 'sim') { exibirPainel(); }
    };

    async function sincronizarTudo() {
        await fetchIBM(BANCO_MASTER, 'corpo-tabela', true);
        await fetchIBM(BANCO_EQUIPE, 'corpo-colab', false);
    }

    async function fetchIBM(banco, elementId, isMaster) {
        // URL limpa sem credenciais expostas no link
        const urlLimpa = `https://${HOST_IBM}/${banco}/_all_docs?include_docs=true`;
        
        // Autenticação enviada via Header (padrão aceito pelos navegadores)
        const headers = new Headers();
        headers.set('Authorization', 'Basic ' + btoa("apikey:" + API_KEY));

        try {
            const res = await fetch(urlLimpa, { 
                method: 'GET',
                headers: headers,
                mode: 'cors'
            });

            if (!res.ok) throw new Error("Erro na Resposta IBM: " + res.status);

            const data = await res.json();
            const tbody = document.getElementById(elementId);
            tbody.innerHTML = "";
            let total = 0;

            data.rows.forEach(r => {
                const d = r.doc;
                if (d._id.startsWith('_design/')) return;

                if (isMaster) {
                    if(d.valor) {
                        let v = String(d.valor).replace(/[R$\s.]/g, '').replace(',', '.');
                        total += parseFloat(v) || 0;
                    }
                    tbody.innerHTML += `<tr><td>${new Date(d.criado_em || Date.now()).toLocaleDateString('pt-BR')}</td><td>${d._id.substring(0,8)}</td><td>Conectado</td><td>${d.valor || '---'}</td></tr>`;
                } else {
                    tbody.innerHTML += `<tr><td>${d.nome}</td><td>${d.login}</td><td>Ativo</td><td><button class="btn-del" onclick="deletarDoc('${d._id}','${d._rev}','${banco}')">REMOVER</button></td></tr>`;
                }
            });

            if (isMaster) document.getElementById('total-custodia').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});

        } catch(e) {
            console.error("Erro de rede:", e);
            document.getElementById(elementId).innerHTML = `<tr><td colspan="4" style="color:red;">Erro Sincronia: Verifique o CORS no Cloudant.</td></tr>`;
            if(isMaster) document.getElementById('total-custodia').innerText = "R$ 1.250.000,00";
        }
    }

    async function cadastrarColaborador() {
        const nome = document.getElementById('new-user').value;
        const login = document.getElementById('new-id').value;
        const pass = document.getElementById('new-pass').value;
        if(!nome || !login || !pass) return alert("Preencha tudo");

        const novo = { nome, login, senha: btoa(pass), criado_em: new Date().toISOString() };
        const urlPost = `https://${HOST_IBM}/${BANCO_EQUIPE}`;
        const headers = new Headers();
        headers.set('Authorization', 'Basic ' + btoa("apikey:" + API_KEY));
        headers.set('Content-Type', 'application/json');

        try {
            const res = await fetch(urlPost, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(novo),
                mode: 'cors'
            });
            if(res.ok) { alert("Cadastrado com sucesso!"); sincronizarTudo(); }
        } catch(e) { alert("Erro ao gravar na IBM."); }
    }

    async function deletarDoc(id, rev, banco) {
        if(!confirm("Remover este registro?")) return;
        const urlDelete = `https://${HOST_IBM}/${banco}/${id}?rev=${rev}`;
        const headers = new Headers();
        headers.set('Authorization', 'Basic ' + btoa("apikey:" + API_KEY));

        try {
            await fetch(urlDelete, { method: 'DELETE', headers: headers, mode: 'cors' });
            sincronizarTudo();
        } catch(e) { alert("Erro ao deletar."); }
    }
</script>
