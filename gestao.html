    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema Gestão | Dallas Enterprise Cluster</title>
    <script>
        /**
         * KERNEL SECURITY PROTOCOL - IBM CLOUD DALLAS US-SOUTH
         * LAYER 7 INTEGRITY: 7 SECTIONS / 47 NODES OPERATIONAL
         */
        const AUTH_PROTOCOL = {
            tokens: [
                'engecema_tk', 
                'engecema_token', 
                'engecema_auth', 
                'engecema_st_valid'
            ],
            status_codes: [
                'AUTHORIZED_V31', 
                'AUTHORIZED_PRIVATE_IBM', 
                'SECURE_V31'
            ],
            origin: 'index.html',
            enforce: true
        };
        (function() {
            const currentStatus = localStorage.getItem('engecema_status');
            const tokenExists = AUTH_PROTOCOL.tokens.some(k => localStorage.getItem(k));
            if (!tokenExists || !AUTH_PROTOCOL.status_codes.includes(currentStatus)) {
                window.location.href = AUTH_PROTOCOL.origin;
            }
        })();
    </script>
    <style>
        :root {

            --enge-success: #15803d;
            --enge-border: #e8ebf0;
            --enge-shadow: rgba(0,0,0,0.15);

            padding: 0;

        }
        .header-enterprise {

            left: 0;

            background: var(--enge-surface);

        .logo-frame img { height: 65px; }

        .user-data { text-align: right; }
        .user-data strong { display: block; color: var(--enge-red); font-size: 20px; text-transform: uppercase; font-weight: 900; }
        .btn-exit {
            background: var(--enge-red);
            color: #fff;
            border: none;
            padding: 25px 55px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #900000; transform: scale(1.05); }
        .main-canvas { max-width: 1750px; margin: 210px auto 150px; padding: 0 100px; }
        .hero-card {
            background: var(--enge-surface);
            padding: 100px;
            border-radius: 35px;
            border-left: 30px solid var(--enge-red);
            box-shadow: 0 60px 120px var(--enge-shadow);
            margin-bottom: 100px;
            position: relative;
        }
        .hero-card label { font-size: 18px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 5px; }
        .hero-card h1 { font-size: 85px; margin: 40px 0; font-weight: 900; letter-spacing: -4px; color: var(--enge-black); }
        
        .secao-container { margin-bottom: 90px; }
        .secao-header { 
            color: var(--enge-blue);
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 8px solid var(--enge-border);
            padding-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }
        .node-badge { background: var(--enge-red); color: #fff; padding: 10px 25px; border-radius: 12px; font-size: 14px; font-weight: 900; }
        .grid-v47 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 45px; margin-top: 50px; }
        .unit-card {
            background: var(--enge-surface);
            padding: 70px 40px;
            text-align: center;
            border: 4px solid #f0f3f7;
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .unit-card:hover { border-color: var(--enge-red); transform: translateY(-20px); box-shadow: 0 35px 70px rgba(204,9,47,0.2); }
        .unit-card i { font-size: 75px; font-style: normal; margin-bottom: 35px; }
        .unit-card span { font-size: 18px; font-weight: 900; text-transform: uppercase; color: #333; }

        .btn-recovery-link {
            display: inline-block;
            color: var(--enge-red);
            font-weight: 900;
            text-decoration: none;
            border: 5px solid var(--enge-red);
            padding: 22px 60px;
            border-radius: 15px;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 70px;
        }
        .btn-recovery-link:hover { background: var(--enge-red); color: #fff; }

        .footer {
            margin-top: 250px;
            padding: 120px 0;
            border-top: 6px solid var(--enge-border);
            text-align: center;
            font-size: 20px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 10px;
            background: #fff;
        }

            total: 47,
            sections: [
                { id: 1, label: "Transações e Fluxo", count: 15, icon: "📱" },
                { id: 2, label: "Crédito e Fomento", count: 4, icon: "💰" },
                { id: 3, label: "Investimentos Private", count: 4, icon: "💎" },
                { id: 4, label: "Contas Especiais", count: 7, icon: "🌍" },

        const EngineCore = {
            init: function() {
                this.authenticate();
                this.render();
                document.getElementById('GESTAO-STABLE-V250').style.display = 'block';
            },
            authenticate: function() {
                const u = localStorage.getItem('engecema_user') || "GEONI CESAR DE MATOS";
                const b = localStorage.getItem('sessao_saldo') || "1250000.00";
                document.getElementById('user-display-tag').innerText = u.toUpperCase();
                document.getElementById('main-balance-display').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(b);
            },
            render: function() {
                const mount = document.getElementById('parity-mount-point');
                if (!mount) return;
                let html = "";
                CLUSTER_MAP.sections.forEach(sec => {
                    html += `<div class="secao-container">
                        <div class="secao-header">${sec.id}. ${sec.label} <span class="node-badge">${sec.count} NODES</span></div>
                        <div class="grid-v47">`;
                    for (let i = 1; i <= sec.count; i++) {
                        html += `
                            <div class="unit-card" onclick="alert('Acesso ao Node ${sec.id}.${i} concedido')">
                                <i>${sec.icon}</i>
                                <span>Subseção ${sec.id}.${i.toString().padStart(2, '0')}</span>
                            </div>`;
                    }
                    html += `</div></div>`;
                });
                mount.innerHTML = html;
            },
            logout: function() {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        };
