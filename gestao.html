<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema | Gestão de Ativos Dallas</title>
    <script>
        const AUTH_GATE = {
            target: "AUTHORIZED_V31",
            storage: "engecema_",
            redirect: "index.html"
        };
        (function() {
            const st = localStorage.getItem(AUTH_GATE.storage + 'status');
            if (st !== AUTH_GATE.target) {
                window.location.href = AUTH_GATE.redirect;
            }
        })();
    </script>
    <style>
        :root {
            --br-red: #cc092f;
            --br-blue: #004481;
            --bg-canvas: #f4f7f9;
            --surface: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --status-ok: #15803d;
        }
        body {
            margin: 0;
            padding: 0;
            display: none;
            background-color: var(--bg-canvas);
            font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
            color: var(--text-main);
        }
        .header-enterprise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: var(--surface);
            border-bottom: 6px solid var(--br-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 10000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .brand-box img { height: 45px; }
        .meta-user { text-align: right; margin-right: 25px; }
        .meta-user strong { display: block; color: var(--br-red); font-size: 14px; text-transform: uppercase; }
        .meta-user span { font-size: 10px; font-weight: 700; color: var(--status-ok); }
        .main-viewport { max-width: 1300px; margin: 130px auto 50px; padding: 0 40px; }
        .asset-card {
            background: var(--surface);
            padding: 45px;
            border-radius: 12px;
            border-left: 12px solid var(--br-red);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin-bottom: 45px;
        }
        .asset-card span { font-size: 13px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .asset-card h1 { font-size: 52px; margin: 15px 0; font-weight: 900; }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .module-card {
            background: var(--surface);
            padding: 35px;
            border-radius: 10px;
            border: 1px solid #e0e4e8;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .module-card:hover { border-color: var(--br-red); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(204,9,47,0.1); }
        .module-card i { font-style: normal; font-size: 40px; }
        .module-card h3 { margin: 0; font-size: 18px; color: var(--br-blue); font-weight: 900; }
        .module-card p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .btn-logout {
            background: var(--br-red);
            color: var(--surface);
            border: none;
            padding: 14px 28px;
            border-radius: 5px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #a00725; }
        .matrix-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 20000;
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }
        .matrix-box {
            background: var(--surface);
            width: 90%;
            max-width: 1000px;
            padding: 50px;
            border-radius: 15px;
            border-top: 10px solid var(--br-red);
        }
        .node-element {
            display: inline-block;
            width: 65px;
            height: 45px;
            background: var(--br-blue);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            line-height: 45px;
            margin: 6px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .node-element:hover { background: var(--br-red); transform: scale(1.1); }
    </style>
</head>
<body id="APP-INSTANCE">

    <header class="header-enterprise">
        <div class="brand-box">
            <img src="logo.png" alt="Engecema">
        </div>
        <div style="display: flex; align-items: center;">
            <div class="meta-user">
                <strong id="user-display">GEONI CESAR DE MATOS</strong>
                <span id="sync-label">SESSÃO CRIPTOGRAFADA Dallas us-south</span>
            </div>
            <button class="btn-logout" onclick="Core.exit()">Encerrar Sistema</button>
        </div>
    </header>

    <main class="main-viewport">
        <div class="asset-card">
            <span>Patrimônio sob Custódia Mirror Bradesco Private</span>
            <h1 id="balance-display">R$ 0,00</h1>
            <div style="font-size: 11px; color: var(--status-ok); font-weight: 800;">STATUS: CLUSTER DALLAS-V31 OPERACIONAL</div>
        </div>

        <div id="module-container" class="module-grid"></div>
    </main>

    <div id="matrix-portal" class="matrix-modal">
        <div class="matrix-box">
            <h2 id="portal-title" style="color: var(--br-blue); text-transform: uppercase;"></h2>
            <div id="portal-render" style="margin: 30px 0; min-height: 200px;"></div>
            <div style="text-align: right;">
                <button onclick="Core.closePortal()" style="padding: 12px 30px; cursor: pointer; font-weight: bold; background: #eee; border: none; border-radius: 4px;">FECHAR JANELA</button>
            </div>
        </div>
    </div>

    <script>
        const AppState = {
            balance: 1250000.00,
            sections: 7,
            nodes: 47,
            user: "Engecema Admin",
            sync: true
        };

        const Core = {
            init: function() {
                this.authenticate();
                this.drawUI();
                this.heartbeat();
                document.getElementById('APP-INSTANCE').style.display = 'block';
            },
            authenticate: function() {
                const u = localStorage.getItem('engecema_user') || "GEONI CESAR DE MATOS";
                const b = localStorage.getItem('sessao_saldo') || AppState.balance;
                document.getElementById('user-display').innerText = u.toUpperCase();
                document.getElementById('balance-display').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(b);
            },
            drawUI: function() {
                const target = document.getElementById('module-container');
                const modules = [
                    { id: 1, n: "Gestão RH", i: "👥", d: "Controle de folha e colaboradores Engecema." },
                    { id: 2, n: "Financeiro", i: "💰", d: "Fluxo de caixa e fomento Bradesco Private." },
                    { id: 3, n: "Infraestrutura", i: "🖥️", d: "Status de 47 Subseções no Cluster Dallas." },
                    { id: 4, n: "Segurança", i: "🛡️", d: "Protocolos TLS-1.3 e Criptografia AES-256." },
                    { id: 5, n: "Auditoria", i: "📑", d: "Logs de acesso e sincronização IBM Cloud." },
                    { id: 6, n: "Configurações", i: "⚙️", d: "Parâmetros de rede e espelhamento." }
                ];
                target.innerHTML = modules.map(m => `
                    <div class="module-card" onclick="Core.openPortal('${m.n}')">
                        <i>${m.i}</i>
                        <h3>${m.n}</h3>
                        <p>${m.d}</p>
                    </div>
                `).join('');
            },
            openPortal: function(name) {
                const modal = document.getElementById('matrix-portal');
                const render = document.getElementById('portal-render');
                document.getElementById('portal-title').innerText = name;
                
                if (name === "Infraestrutura") {
                    let h = `<p style="font-size:14px; margin-bottom:20px;">Mapeamento de 47 Nodes em 7 Seções de Segurança:</p>`;
                    for(let i=0; i<AppState.nodes; i++) {
                        h += `<div class="node-element">N-${(i+1).toString().padStart(2,'0')}</div>`;
                    }
                    render.innerHTML = h;
                } else {
                    render.innerHTML = `<div style="text-align:center; padding:50px;">Acessando Banco Cloudant-yr...<br><strong>Sincronizando dados com regional São Paulo.</strong></div>`;
                }
                modal.style.display = 'flex';
            },
            closePortal: function() {
                document.getElementById('matrix-portal').style.display = 'none';
            },
            heartbeat: function() {
                setInterval(() => {
                    console.log("[HEARTBEAT] Sincronização Dallas us-south ativa.");
                }, 60000);
            },
            exit: function() {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        };

        const Validator = {
            checkNodes: function() { return AppState.nodes === 47; },
            checkSections: function() { return AppState.sections === 7; }
        };

        const DataProvider = {
            get: function(key) { return localStorage.getItem(key); },
            set: function(key, val) { localStorage.setItem(key, val); }
        };

        const LogicInterceptor = {
            active: true,
            protocol: "TLS-1.3",
            verify: function() { return this.active; }
        };

        const ClusterManager = {
            region: "us-south",
            status: "OPERATIONAL",
            version: "v31.8.0"
        };

        const SecurityAudit = {
            level: "MAXIMUM",
            cipher: "AES-256-GCM"
        };

        const UI_Manager = {
            refresh: function() { window.location.reload(); },
            toggle: function(id) { 
                const el = document.getElementById(id);
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        };

        const StorageSync = {
            lastSync: Date.now(),
            mirror: "BRADESCO-PRIVATE"
        };

        const MetricsEngine = {
            cpu: 0.12,
            latency: "14ms",
            report: function() { return `Latency: ${this.latency}`; }
        };

        const MaintenanceNode = {
            lastCheck: "2023-10-27",
            status: "PASS"
        };

        const EventRouter = {
            route: "GESTAO",
            secure: true
        };

        const ParityCheck = {
            v: 1.0,
            status: "VALID"
        };

        const IdentityProvider = {
            provider: "IBM-IAM",
            active: true
        };

        const DatabaseGateway = {
            service: "Cloudant-yr",
            connected: true
        };

        const RedundancyProtocol = {
            enabled: true,
            type: "MIRROR-DALLAS"
        };

        const RuntimeEnvironment = {
            env: "PRODUCTION",
            node: "NODE-01"
        };

        const AssetIntegrity = {
            balance: 1250000.00,
            validate: function() { return true; }
        };

        const InterfaceController = {
            init: function() {
                if(Validator.checkNodes() && Validator.checkSections()) {
                    Core.init();
                } else {
                    console.error("FALHA DE PARIDADE NO CLUSTER");
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => InterfaceController.init());
    </script>
</body>
</html>
