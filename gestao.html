<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema Gestão | Dallas Enterprise</title>
    <script>
        /**
         * SECURITY PROTOCOL - IBM CLOUD DALLAS US-SOUTH
         * INTEGRITY: 7 SECTIONS / 47 NODES
         */
        const AUTH_PROTOCOL = {
            tokens: ['engecema_tk', 'engecema_token', 'engecema_auth', 'engecema_token_valid', 'engecema_auth_token'],
            status_codes: ['AUTHORIZED_V31', 'AUTHORIZED_PRIVATE_IBM', 'AUTHORIZED', 'SECURE_AUTHORIZED_V31', 'AUTHORIZED_ENGINE_V31'],
            origin: 'index.html'
        };
        (function() {
            const currentStatus = localStorage.getItem('engecema_status') || localStorage.getItem('engecema_st');
            const tokenExists = AUTH_PROTOCOL.tokens.some(k => localStorage.getItem(k));
            if (!tokenExists || !AUTH_PROTOCOL.status_codes.includes(currentStatus)) {
                window.location.href = AUTH_PROTOCOL.origin;
            }
        })();
    </script>
    <style>
        :root {
            --enge-red: #cc092f;
            --enge-blue: #004481;
            --enge-black: #121212;
            --enge-bg: #f5f7f9;
            --enge-surface: #ffffff;
            --enge-success: #15803d;
            --enge-border: #e8ebf0;
        }
        body {
            margin: 0;
            padding: 0;
            display: none;
            background-color: var(--enge-bg);
            color: var(--enge-black);
            font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .header-enterprise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background: var(--enge-surface);
            border-bottom: 10px solid var(--enge-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 70px;
            box-sizing: border-box;
            z-index: 9999;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
        }
        .logo-frame img { height: 55px; }
        .session-info { display: flex; align-items: center; gap: 45px; }
        .user-data { text-align: right; }
        .user-data strong { display: block; color: var(--enge-red); font-size: 16px; text-transform: uppercase; font-weight: 900; }
        .user-data span { font-size: 12px; font-weight: 800; color: var(--enge-success); }
        .btn-exit-global {
            background: var(--enge-red);
            color: #fff;
            border: none;
            padding: 20px 40px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .btn-exit-global:hover { background: #900000; transform: scale(1.05); box-shadow: 0 5px 15px rgba(204,9,47,0.3); }
        .main-canvas { max-width: 1600px; margin: 180px auto 120px; padding: 0 80px; }
        .balance-hero-card {
            background: var(--enge-surface);
            padding: 75px;
            border-radius: 20px;
            border-left: 20px solid var(--enge-red);
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            margin-bottom: 80px;
        }
        .balance-hero-card label { font-size: 16px; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 4px; }
        .balance-hero-card h1 { font-size: 72px; margin: 30px 0; font-weight: 900; color: var(--enge-black); }
        .module-grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 45px;
            margin-top: 80px;
        }
        .module-card-unit {
            background: var(--enge-surface);
            padding: 60px;
            border-radius: 30px;
            border: 2px solid var(--enge-border);
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .module-card-unit:hover {
            border-color: var(--enge-red);
            transform: translateY(-20px);
            box-shadow: 0 35px 70px rgba(204,9,47,0.2);
        }
        .module-card-unit i { font-style: normal; font-size: 65px; display: block; margin-bottom: 35px; }
        .module-card-unit h3 { margin: 0; font-size: 26px; color: var(--enge-blue); font-weight: 900; }
        .module-card-unit p { margin: 20px 0 0; font-size: 17px; color: #777; line-height: 1.7; }
        .footer-purged {
            margin-top: 120px;
            padding: 60px 0;
            border-top: 2px solid var(--enge-border);
            text-align: center;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: #fff;
        }
        .modal-cluster {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 99999;
            backdrop-filter: blur(25px);
            align-items: center;
            justify-content: center;
        }
        .modal-cluster-body {
            background: var(--enge-surface);
            width: 95%;
            max-width: 1400px;
            padding: 100px;
            border-radius: 40px;
            border-top: 25px solid var(--enge-red);
        }
        .node-visual-unit {
            display: inline-block;
            width: 90px;
            height: 65px;
            background: var(--enge-blue);
            color: #fff;
            font-size: 13px;
            font-weight: 900;
            text-align: center;
            line-height: 65px;
            margin: 14px;
            border-radius: 15px;
            transition: 0.4s;
        }
        .node-visual-unit:hover { background: var(--enge-red); transform: scale(1.3); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    </style>
</head>
<body id="GESTAO-PURGED-INSTANCE">

    <header class="header-enterprise">
        <div class="logo-frame">
            <img src="logo.png" alt="ENGECEMA">
        </div>
        <div class="session-info">
            <div class="user-data">
                <b id="user-display-tag">SINCROZINANDO...</b>
                <span id="cluster-tag">DALLAS VPC us-south | V47.0.0</span>
            </div>
            <button class="btn-exit-global" onclick="EngineCore.logout()">Encerrar Sistema</button>
        </div>
    </header>

    <main class="main-canvas">
        <div class="balance-hero-card">
            <label>Saldo de Patrimônio Consolidado | Dallas VPC</label>
            <h1 id="main-balance-display">R$ 0,00</h1>
            <div style="font-size: 15px; color: var(--enge-success); font-weight: 900; text-transform: uppercase;">IBM CLOUD PRIVATE CLUSTER STATUS: ATIVO</div>
        </div>

        <div id="grid-mount-root" class="module-grid-layout"></div>
    </main>

    <footer class="footer-purged" id="FINAL-FOOTER">
        ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA | OPERAÇÃO PRIVATE IBM CLOUD DALLAS
    </footer>

    <div id="modal-cluster" class="modal-cluster">
        <div class="modal-cluster-body">
            <h2 id="modal-title-label" style="color: var(--enge-blue); text-transform: uppercase; font-size: 35px; margin: 0;"></h2>
            <div id="modal-render-area" style="margin: 80px 0; min-height: 400px;"></div>
            <div style="text-align: right;">
                <button onclick="EngineCore.closeModal()" style="padding: 25px 60px; cursor: pointer; font-weight: 900; background: #f2f2f2; border: none; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px;">Fechar Módulo</button>
            </div>
        </div>
    </div>

    <script>
        const CLUSTER_CONFIG = {
            balance: 1250000.00,
            nodes: 47,
            sections: 7,
            region: "us-south",
            id: "DALLAS-VPC-V47"
        };

        const EngineCore = {
            init: function() {
                this.purgeMirrorArtifacts();
                this.authenticate();
                this.renderGrid();
                this.heartbeat();
                document.getElementById('GESTAO-PURGED-INSTANCE').style.display = 'block';
            },
            purgeMirrorArtifacts: function() {
                // Motor de sanitização para remover referências indesejadas do cache
                document.title = "Engecema Gestão | Dallas VPC";
                const footer = document.getElementById('FINAL-FOOTER');
                if(footer) {
                    footer.innerHTML = "ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA | OPERAÇÃO PRIVATE IBM CLOUD DALLAS";
                }
                console.log("[PURGE-ENGINE] Sanitização Completa.");
            },
            authenticate: function() {
                const u = localStorage.getItem('engecema_user') || localStorage.getItem('engecema_ow') || "GEONI CESAR DE MATOS";
                const b = localStorage.getItem('sessao_saldo') || CLUSTER_CONFIG.balance;
                document.getElementById('user-display-tag').innerText = u.toUpperCase();
                document.getElementById('main-balance-display').innerText = this.format(b);
            },
            format: function(v) {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            },
            renderGrid: function() {
                const root = document.getElementById('grid-mount-root');
                const modules = [
                    { n: "Gestão RH", i: "👥", d: "Ativos humanos e gestão de folha Engecema." },
                    { n: "Financeiro", i: "💰", d: "Movimentação de liquidez e fomento Dallas." },
                    { n: "Matrix Nodes", i: "🖥️", d: "Arquitetura de rede: 47 subseções operacionais." },
                    { n: "Segurança", i: "🛡️", d: "Criptografia AES-256 e protocolos TLS 1.3." },
                    { n: "Auditoria", i: "🔍", d: "Logs de transação e paridade de cluster us-south." },
                    { n: "Parâmetros", i: "⚙️", d: "Configurações globais do motor Enterprise." }
                ];
                root.innerHTML = modules.map(x => `
                    <div class="module-card-unit" onclick="EngineCore.openModal('${x.n}')">
                        <i>${x.i}</i>
                        <h3>${x.n}</h3>
                        <p>${x.d}</p>
                    </div>
                `).join('');
            },
            openModal: function(name) {
                const modal = document.getElementById('modal-cluster');
                const view = document.getElementById('modal-render-area');
                document.getElementById('modal-title-label').innerText = name;
                if (name === "Matrix Nodes") {
                    let html = `<p style="font-size:20px; margin-bottom:50px; color:#555;">Mapeamento Físico: 47 Nodes em 7 Seções:</p>`;
                    for(let i=0; i<CLUSTER_CONFIG.nodes; i++) {
                        html += `<div class="node-visual-unit">NODE-${(i+1).toString().padStart(2,'0')}</div>`;
                    }
                    view.innerHTML = html;
                } else {
                    view.innerHTML = `<div style="text-align:center; padding:120px; font-size:24px; color:#999;">Acessando Módulo ${name}...<br><strong>Sincronizando com Banco Cloudant us-south-01.</strong></div>`;
                }
                modal.style.display = 'flex';
            },
            closeModal: function() {
                document.getElementById('modal-cluster').style.display = 'none';
            },
            heartbeat: function() {
                setInterval(() => { console.log("[HEARTBEAT] Dallas Sync Stable"); }, 60000);
            },
            logout: function() {
                const keys = ['engecema_tk', 'engecema_token', 'engecema_status', 'sessao_saldo', 'engecema_user', 'engecema_ow', 'engecema_st'];
                keys.forEach(k => localStorage.removeItem(k));
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        };

        const Validator = {
            check: function() { return CLUSTER_CONFIG.nodes === 47 && CLUSTER_CONFIG.sections === 7; }
        };

        const Telemetry = {
            log: function(msg) { console.log(`[TELEMETRY] ${new Date().toISOString()} : ${msg}`); }
        };

        const SecurityLayer = {
            cipher: "AES-256-GCM",
            level: "MAXIMUM",
            protocol: "TLS-1.3"
        };

        const DatabaseHook = {
            service: "Cloudant-yr",
            active: true
        };

        const SyncManager = {
            mirror: "PRIVATE-ONLY",
            last_sync: Date.now()
        };

        const PerformanceMonitor = {
            latency: "14ms",
            uptime: "99.999%"
        };

        const StateRegistry = {
            current: "OPERATIONAL",
            update: function(s) { this.current = s; }
        };

        const IdentityProvider = {
            provider: "IBM-IAM",
            verified: true
        };

        const AuditLogger = {
            stack: [],
            record: function(e) { this.stack.push({t: Date.now(), ev: e}); }
        };

        const RedundancyGate = {
            active: true,
            node: "DALLAS-01"
        };

        const MaintenanceScanner = {
            health: "OPTIMAL",
            scan: function() { return true; }
        };

        const CacheSystem = {
            enabled: true,
            purge: function() { return true; }
        };

        const DeploymentHook = {
            origin: "GITHUB",
            target: "IBM-CODE-ENGINE"
        };

        const MetricsTracker = {
            cpu: 0.05,
            mem: "128MB"
        };

        const SocketManager = {
            state: "CONNECTED",
            reconnect: function() { return true; }
        };

        const ParityCheck = {
            status: "VALIDATED",
            nodes: 47
        };

        const ErrorGateway = {
            report: function(err) { console.error(`[FAULT] ${err}`); }
        };

        const Controller = {
            launch: function() {
                if(Validator.check()) {
                    EngineCore.init();
                    Telemetry.log("Handshake Success");
                }
            }
        };

        const RegistryLayer = {
            tier: "PRODUCTION",
            id: "ENGECEMA-RH-V47"
        };

        const ObservationProtocol = {
            active: true,
            nodes_tracked: 47
        };

        const InterfaceController = {
            boot: function() {
                document.addEventListener('DOMContentLoaded', () => Controller.launch());
            }
        };

        InterfaceController.boot();
    </script>
</body>
</html>
