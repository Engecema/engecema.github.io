name: Integracao IBM Cloud

on:
  push:
    branches: [ main, master ]

jobs:
  banco-digital-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm install @ibm-cloud/cloudant ibm-cloud-sdk-core

      - name: PASSO 1 - Consultar Saldo Inicial
        run: node consultar-saldo.js
        env:
          CLOUDANT_API_KEY: ${{ secrets.CLOUDANT_API_KEY }}
          CLOUDANT_URL: ${{ secrets.CLOUDANT_URL }}

      - name: PASSO 2 - Realizar Pagamento e Registrar Extrato
        run: |
          node transferir.js
          node registrar-extrato.js
        env:
          CLOUDANT_API_KEY: ${{ secrets.CLOUDANT_API_KEY }}
          CLOUDANT_URL: ${{ secrets.CLOUDANT_URL }}

      - name: PASSO 3 - Consultar Saldo Final
        run: node consultar-saldo.js
        env:
          CLOUDANT_API_KEY: ${{ secrets.CLOUDANT_API_KEY }}
          CLOUDANT_URL: ${{ secrets.CLOUDANT_URL }}
